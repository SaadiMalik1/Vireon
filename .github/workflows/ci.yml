name: VIREON CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          pip install ruff mypy pytest pydantic pyyaml numpy click
          cargo clippy --workspace -- -D warnings
          cargo fmt --check
          ruff check vireon tests
          mypy vireon || true

  test-python:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          pip install -e ".[dev]"
          maturin build --manifest-path crates/neurodsl/python_ext/Cargo.toml --out target/wheels
          pip install target/wheels/*.whl
          pytest



  test-rust:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --locked

  test-integration:
    runs-on: ubuntu-latest
    needs: [test-python, test-rust]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - run: |
          pip install -e ".[dev]"
          pytest tests/test_integration.py || true

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
      - run: |
          pip install pip-audit
          pip-audit || true
